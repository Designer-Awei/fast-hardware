<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fast Hardware Loading</title>
    <style>
        :root {
            --bg-1: #04131c;
            --bg-2: #0a2433;
            --accent: #1ea3e6;
            --accent-soft: rgba(30, 163, 230, 0.25);
            --text: #eaf7ff;
            --muted: rgba(234, 247, 255, 0.68);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            overflow: hidden;
            font-family: "Segoe UI", "Microsoft YaHei UI", sans-serif;
            background:
                radial-gradient(circle at 20% 20%, rgba(30, 163, 230, 0.20), transparent 35%),
                radial-gradient(circle at 80% 75%, rgba(30, 163, 230, 0.16), transparent 30%),
                linear-gradient(135deg, var(--bg-1), var(--bg-2));
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .splash-shell {
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            isolation: isolate;
        }

        .splash-shell::before {
            content: "";
            position: absolute;
            inset: 28px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            box-shadow: inset 0 0 0 1px rgba(30, 163, 230, 0.06);
        }

        .splash-card {
            width: min(540px, calc(100vw - 64px));
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 22px;
            text-align: center;
        }

        .logo-wrap {
            position: relative;
            width: 118px;
            height: 118px;
            display: grid;
            place-items: center;
            transform: translateY(14px);
        }

        .logo-wrap::before {
            content: "";
            position: absolute;
            inset: -18px;
            border-radius: 32px;
            background: radial-gradient(circle, rgba(30, 163, 230, 0.38), transparent 65%);
            filter: blur(14px);
            animation: pulseGlow 2.4s ease-in-out infinite;
        }

        .logo-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 0;
            box-shadow:
                0 18px 40px rgba(0, 0, 0, 0.35),
                0 0 0 1px rgba(255, 255, 255, 0.06);
            animation: floatLogo 2.8s ease-in-out infinite;
        }

        .brand {
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
        }

        .brand h1 {
            font-size: 42px;
            font-weight: 800;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            background: linear-gradient(90deg, #ffffff 0%, #7ed7ff 45%, #1ea3e6 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 28px rgba(30, 163, 230, 0.24);
            animation: shimmer 2.4s linear infinite;
            background-size: 180% auto;
        }

        .brand p {
            font-size: 14px;
            letter-spacing: 0.28em;
            color: var(--muted);
            text-transform: uppercase;
        }

        .loader {
            width: min(320px, 70vw);
            height: 4px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.08);
            overflow: hidden;
            position: relative;
        }

        .loader::before {
            content: "";
            position: absolute;
            top: 0;
            left: -35%;
            width: 35%;
            height: 100%;
            border-radius: inherit;
            background: linear-gradient(90deg, transparent, #68d5ff, #1ea3e6, transparent);
            animation: loadingBar 1.2s ease-in-out infinite;
        }

        .status {
            font-size: 13px;
            color: var(--muted);
            letter-spacing: 0.08em;
            transform: translateY(-8px);
        }

        @keyframes loadingBar {
            0% { left: -35%; }
            100% { left: 100%; }
        }

        @keyframes pulseGlow {
            0%, 100% { transform: scale(0.95); opacity: 0.7; }
            50% { transform: scale(1.08); opacity: 1; }
        }

        @keyframes floatLogo {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        @keyframes shimmer {
            0% { background-position: 0% 50%; }
            100% { background-position: 180% 50%; }
        }
    </style>
</head>
<body>
    <div class="splash-shell">
        <div class="splash-card">
            <div class="logo-wrap">
                <img src="./assets/Fast%20Hardware.png" alt="Fast Hardware Logo">
            </div>
            <div class="brand">
                <h1>Fast Hardware</h1>
                <p>Intelligent Hardware Design Studio</p>
            </div>
            <div class="loader"></div>
            <div class="status">Initializing modules...</div>
        </div>
    </div>
</body>
</html>
